<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Task - Smart Task Manager</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#005236",
                    "on-primary-container": "#fefcff",
                    "surface-container-highest": "#d3e4fe",
                    "surface-variant": "#d3e4fe",
                    "secondary-fixed": "#6ffbbe",
                    "outline-variant": "#c2c6d6",
                    "inverse-on-surface": "#eaf1ff",
                    "primary": "#0058be",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#002113",
                    "on-tertiary-fixed-variant": "#653e00",
                    "on-background": "#0b1c30",
                    "inverse-surface": "#213145",
                    "secondary-container": "#6cf8bb",
                    "surface-container-low": "#eff4ff",
                    "surface": "#f8f9ff",
                    "surface-bright": "#f8f9ff",
                    "primary-fixed": "#d8e2ff",
                    "on-tertiary-fixed": "#2a1700",
                    "primary-fixed-dim": "#adc6ff",
                    "on-error-container": "#93000a",
                    "background": "#f8f9ff",
                    "on-surface-variant": "#424754",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed": "#ffddb8",
                    "on-secondary-container": "#00714d",
                    "error-container": "#ffdad6",
                    "on-error": "#ffffff",
                    "on-surface": "#0b1c30",
                    "tertiary-container": "#a36700",
                    "secondary-fixed-dim": "#4edea3",
                    "inverse-primary": "#adc6ff",
                    "tertiary": "#825100",
                    "on-primary-fixed": "#001a42",
                    "secondary": "#006c49",
                    "on-primary-fixed-variant": "#004395",
                    "on-tertiary-container": "#fffbff",
                    "error": "#ba1a1a",
                    "tertiary-fixed-dim": "#ffb95f",
                    "primary-container": "#2170e4",
                    "surface-dim": "#cbdbf5",
                    "on-secondary": "#ffffff",
                    "surface-container-high": "#dce9ff",
                    "surface-container": "#e5eeff",
                    "on-primary": "#ffffff",
                    "outline": "#727785",
                    "surface-tint": "#005ac2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "base": "4px",
                    "container-max": "1280px",
                    "md": "16px",
                    "xl": "40px",
                    "lg": "24px",
                    "xs": "4px",
                    "sm": "8px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "headline-sm": ["Plus Jakarta Sans"],
                    "body-sm": ["Inter"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"],
                    "label-sm": ["Inter"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Inter"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "label-md": ["14px", {"lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "headline-sm": ["18px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .form-input-focus {
            transition: all 0.2s ease;
        }
        .form-input-focus:focus {
            background-color: white !important;
            box-shadow: 0 0 0 2px theme('colors.primary');
            outline: none;
        }
        .bounce-check:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface shadow-sm sticky top-0 z-50">
<div class="flex justify-between items-center px-lg py-md w-full max-w-container-max mx-auto">
<div class="text-headline-sm font-headline-sm font-bold text-primary">
                Smart Task Manager
            </div>
<nav class="hidden md:flex items-center space-x-lg">
<a class="text-on-surface-variant hover:bg-surface-container-low transition-colors px-sm py-xs rounded-lg font-label-md text-label-md" href="#">Dashboard</a>
<a class="text-primary border-b-2 border-primary px-sm py-xs font-label-md text-label-md" href="#">Add Task</a>
<a class="text-on-surface-variant hover:bg-surface-container-low transition-colors px-sm py-xs rounded-lg font-label-md text-label-md" href="#">Calendar</a>
</nav>
<div class="flex items-center space-x-md">
<button class="material-symbols-outlined text-on-surface-variant p-sm hover:bg-surface-container-low rounded-full transition-colors">notifications</button>
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed font-bold">JD</div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile py-xl">
<div class="w-full max-w-2xl">
<!-- Header Section -->
<div class="mb-xl text-center">
<h1 class="font-headline-lg text-headline-lg text-on-background mb-base">Create Task</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Clear your mind by organizing your next priority.</p>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-lg shadow-sm border border-outline-variant/30 transition-all duration-300">
<form class="space-y-lg">
<!-- Task Title -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="task-title">Task Title</label>
<input class="w-full h-12 px-md bg-[#F1F5F9] border-none rounded-lg font-body-md text-body-md text-on-surface form-input-focus placeholder:text-outline" id="task-title" placeholder="e.g., Study for Calculus Midterm" type="text"/>
</div>
<!-- Description -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="description">Description</label>
<textarea class="w-full p-md bg-[#F1F5F9] border-none rounded-lg font-body-md text-body-md text-on-surface form-input-focus placeholder:text-outline resize-none" id="description" placeholder="Break down your steps or add context here..." rows="4"></textarea>
</div>
<!-- Grid for Date and Priority -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Due Date -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="due-date">Due Date</label>
<div class="relative">
<input class="w-full h-12 px-md bg-[#F1F5F9] border-none rounded-lg font-body-md text-body-md text-on-surface form-input-focus" id="due-date" type="date"/>
</div>
</div>
<!-- Priority Selection -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm">Priority</label>
<div class="flex p-1 bg-[#F1F5F9] rounded-lg h-12 items-center justify-between">
<label class="flex-1 flex items-center justify-center h-full">
<input class="sr-only peer" name="priority" type="radio" value="low"/>
<span class="w-full h-full flex items-center justify-center rounded-md font-label-md text-label-md text-on-surface-variant cursor-pointer transition-all peer-checked:bg-white peer-checked:text-secondary peer-checked:shadow-sm">LOW</span>
</label>
<label class="flex-1 flex items-center justify-center h-full">
<input checked="" class="sr-only peer" name="priority" type="radio" value="medium"/>
<span class="w-full h-full flex items-center justify-center rounded-md font-label-md text-label-md text-on-surface-variant cursor-pointer transition-all peer-checked:bg-white peer-checked:text-tertiary-container peer-checked:shadow-sm">MEDIUM</span>
</label>
<label class="flex-1 flex items-center justify-center h-full">
<input class="sr-only peer" name="priority" type="radio" value="high"/>
<span class="w-full h-full flex items-center justify-center rounded-md font-label-md text-label-md text-on-surface-variant cursor-pointer transition-all peer-checked:bg-white peer-checked:text-error peer-checked:shadow-sm">HIGH</span>
</label>
</div>
</div>
</div>
<!-- Illustration / Atmospheric Space -->
<div class="py-md opacity-60">
<div class="h-px bg-gradient-to-r from-transparent via-outline-variant to-transparent"></div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col md:flex-row-reverse gap-md pt-md">
<button class="flex-1 h-14 bg-primary text-on-primary font-label-md text-label-md rounded-full shadow-sm hover:brightness-110 active:scale-95 transition-all duration-200" type="submit">
                            Save Task
                        </button>
<button class="flex-1 h-14 bg-[#EFF6FF] text-primary font-label-md text-label-md rounded-full hover:bg-surface-container-high active:scale-95 transition-all duration-200" type="button">
                            Cancel
                        </button>
</div>
</form>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface-container-low border-t border-outline-variant">
<div class="flex flex-col md:flex-row justify-between items-center px-lg py-xl w-full max-w-container-max mx-auto space-y-md md:space-y-0">
<div class="font-headline-sm text-headline-sm text-on-surface">
                Smart Task Manager
            </div>
<div class="flex space-x-lg">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors hover:underline" href="#">Privacy</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors hover:underline" href="#">Terms</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors hover:underline" href="#">Support</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors hover:underline" href="#">Contact</a>
</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">
                © 2024 Smart Task Manager. Built for students.
            </div>
</div>
</footer>
<script>
        // Micro-interaction for form handling
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Saving...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check</span> Saved';
                btn.classList.replace('bg-primary', 'bg-secondary');
                setTimeout(() => {
                    alert('Task created successfully!');
                    window.location.reload();
                }, 1000);
            }, 1200);
        });

        // Simple scale effect for the card on hover
        const card = document.querySelector('.bg-surface-container-lowest');
        card.addEventListener('mouseenter', () => {
            card.style.transform = 'translateY(-4px)';
            card.classList.add('shadow-md');
        });
        card.addEventListener('mouseleave', () => {
            card.style.transform = 'translateY(0)';
            card.classList.remove('shadow-md');
        });
    </script>
</body></html>
